name: Déploiement GitHub Pages

# Met le site en ligne automatiquement à chaque mise à jour de la branche.
on:
  push:
    branches: ["claude/cor-data-analysis-site-gg5o4s"]
  workflow_dispatch:

# Permissions minimales nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empaqueter le site (site statique à la racine)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
