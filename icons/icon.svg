    <text x="280" y="320" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="128" font-weight="700" text-anchor="middle" fill="#16294d">COR</text>
    <line x1="114" y1="358" x2="446" y2="358" stroke="#f0a92a" stroke-width="18" stroke-linecap="round"/>
    <line x1="114" y1="394" x2="416" y2="394" stroke="#f0a92a" stroke-width="18" stroke-linecap="round"/>
    <line x1="114" y1="430" x2="344" y2="430" stroke="#f0a92a" stroke-width="18" stroke-linecap="round"/>
  
