<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ceci est mon COR">
  <rect width="512" height="512" rx="100" fill="#16294d"/>
  
    <ellipse cx="244" cy="62" rx="156" ry="28" fill="none" stroke="#f0a92a" stroke-width="22" transform="rotate(-3 244 62)"/>
    
    <!-- dos / pages (gauche) avec pied de reliure retroussé -->
    <path d="M92 150 L92 452 C92 470 108 476 122 468"
          fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <!-- tranche basse (pages) sur toute la largeur -->
    <rect x="104" y="448" width="312" height="28" rx="8" fill="#ffffff"/>
    <!-- couverture -->
    <rect x="112" y="120" width="300" height="330" rx="10" fill="#ffffff"/>
    <!-- reliure (ligne du dos) -->
    <line x1="128" y1="140" x2="128" y2="430" stroke="#16294d" stroke-width="7" stroke-linecap="round"/>
    <text x="270" y="294" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="116" font-weight="700" text-anchor="middle" fill="#16294d">COR</text>
    <line x1="142" y1="342" x2="404" y2="342" stroke="#f0a92a" stroke-width="15" stroke-linecap="round"/>
    <line x1="142" y1="372" x2="368" y2="372" stroke="#f0a92a" stroke-width="15" stroke-linecap="round"/>
    <line x1="142" y1="402" x2="320" y2="402" stroke="#f0a92a" stroke-width="15" stroke-linecap="round"/>
  
</svg>