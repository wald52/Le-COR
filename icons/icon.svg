<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ceci est mon COR">
  <rect width="512" height="512" rx="100" fill="#16294d"/>
  
    <ellipse cx="256" cy="62" rx="152" ry="30" fill="none" stroke="#f0a92a" stroke-width="15" transform="rotate(-4 256 62)"/>
    
    <!-- tranche basse (pages) -->
    <rect x="100" y="452" width="312" height="26" rx="12" fill="#ffffff"/>
    <!-- pied de reliure qui se retrousse en bas à gauche -->
    <path d="M124 454 C92 452 74 474 88 490 C92 495 99 495 102 490"
          fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <!-- couverture (portrait) -->
    <rect x="88" y="104" width="336" height="346" rx="24" fill="#ffffff"/>
    <!-- reliure -->
    <line x1="122" y1="128" x2="122" y2="448" stroke="#16294d" stroke-width="10" stroke-linecap="round"/>
    <text x="276" y="298" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif" font-size="116" font-weight="700" text-anchor="middle" fill="#16294d">COR</text>
    <line x1="138" y1="340" x2="410" y2="340" stroke="#f0a92a" stroke-width="16" stroke-linecap="round"/>
    <line x1="138" y1="376" x2="384" y2="376" stroke="#f0a92a" stroke-width="16" stroke-linecap="round"/>
    <line x1="138" y1="412" x2="320" y2="412" stroke="#f0a92a" stroke-width="16" stroke-linecap="round"/>
  
</svg>